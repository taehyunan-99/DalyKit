<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HarnessDA Report</title>
<style>
/* ============================================================
   1. 스케일 시스템
   ============================================================ */
:root {
  --s: 1;
  --fs-h1:    calc(36px * var(--s));
  --fs-h2:    calc(28px * var(--s));
  --fs-body:  calc(16px * var(--s));
  --fs-small: calc(12px * var(--s));
  --spacing:  calc(24px * var(--s));

  /* 기본값: general */
  --primary: #2D3E6B;
  --accent:  #5B8DEF;
  --bg:      #F7F8FC;
  --text:    #2C2C3E;
  --card-bg: rgba(255,255,255,0.85);
  --card-border: rgba(0,0,0,0.08);
}

/* ============================================================
   2. 도메인 5종 색상 팔레트
   ============================================================ */
.finance       { --primary:#1B2D5B; --accent:#C9A84C; --bg:#F5F6F8; --text:#1A1A2E; --card-bg:rgba(255,255,255,0.9); --card-border:rgba(27,45,91,0.12); }
.healthcare    { --primary:#2BA084; --accent:#2BA084; --bg:#F0FAF8; --text:#1C3A35; --card-bg:rgba(255,255,255,0.9); --card-border:rgba(43,160,132,0.12); }
.manufacturing { --primary:#2C3E50; --accent:#E87722; --bg:#F4F5F7; --text:#1A1A1A; --card-bg:rgba(255,255,255,0.9); --card-border:rgba(44,62,80,0.12); }
.ecommerce     { --primary:#1A0533; --accent:#C940D5; --bg:#0D0D1A; --text:#F0E6FF; --card-bg:rgba(255,255,255,0.06); --card-border:rgba(201,64,213,0.2); }
.general       { --primary:#2D3E6B; --accent:#5B8DEF; --bg:#F7F8FC; --text:#2C2C3E; --card-bg:rgba(255,255,255,0.85); --card-border:rgba(0,0,0,0.08); }

/* ============================================================
   3. 용도별 분기
   ============================================================ */
.presentation .slide-content { font-size: var(--fs-body); line-height: 1.8; }
.portfolio    .slide-content { font-size: calc(14px * var(--s)); line-height: 1.6; }
.presentation .slide-inner   { padding: calc(48px * var(--s)) calc(56px * var(--s)); }
.portfolio    .slide-inner   { padding: calc(32px * var(--s)) calc(40px * var(--s)); }
.presentation .slide-header  { font-size: var(--fs-h1); }
.portfolio    .slide-header  { font-size: var(--fs-h2); }

/* ============================================================
   4. 기본 리셋 + body
   ============================================================ */
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Malgun Gothic','Apple SD Gothic Neo','AppleGothic',sans-serif;
  background: var(--bg);
  color: var(--text);
  overflow: hidden;
}

/* ============================================================
   5. 슬라이드 캔버스 16:9
   ============================================================ */
#slide-viewport {
  display: flex;
  justify-content: center;
  align-items: center;
  width: 100vw;
  height: 100vh;
}
.slide {
  width: calc(960px * var(--s));
  height: calc(540px * var(--s));
  background: var(--bg);
  position: relative;
  overflow: hidden;
  flex-shrink: 0;
}
.slide-inner {
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
}
.slide-header {
  color: var(--primary);
  font-weight: 700;
  margin-bottom: calc(16px * var(--s));
  flex-shrink: 0;
}
.slide-body {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  overflow: hidden;
}
.slide-footer {
  position: absolute;
  bottom: calc(12px * var(--s));
  right: calc(20px * var(--s));
  font-size: var(--fs-small);
  opacity: 0.5;
}

/* ============================================================
   6. 공통 컴포넌트
   ============================================================ */
/* 카드 */
.card {
  background: var(--card-bg);
  border: 1px solid var(--card-border);
  border-radius: calc(8px * var(--s));
  padding: calc(16px * var(--s));
}
.card-grid {
  display: grid;
  gap: calc(12px * var(--s));
}
.card-grid.cols-2 { grid-template-columns: 1fr 1fr; }
.card-grid.cols-3 { grid-template-columns: 1fr 1fr 1fr; }
.card-grid.cols-4 { grid-template-columns: 1fr 1fr 1fr 1fr; }

/* 수치 강조 카드 */
.metric-card {
  background: var(--card-bg);
  border: 1px solid var(--card-border);
  border-radius: calc(8px * var(--s));
  padding: calc(14px * var(--s));
  text-align: center;
}
.metric-card.highlight {
  border-color: var(--accent);
  border-width: 2px;
}
.metric-label {
  font-size: var(--fs-small);
  opacity: 0.7;
  margin-bottom: calc(4px * var(--s));
}
.metric-value {
  font-size: calc(24px * var(--s));
  font-weight: 700;
  color: var(--primary);
}
.metric-card.highlight .metric-value { color: var(--accent); }

/* 인사이트 박스 */
.insight-box {
  border-left: 3px solid var(--accent);
  padding: calc(10px * var(--s)) calc(14px * var(--s));
  font-size: var(--fs-small);
  font-style: italic;
  opacity: 0.85;
  margin-top: auto;
  flex-shrink: 0;
  background: color-mix(in srgb, var(--accent) 6%, transparent);
}

/* 테이블 */
.data-table {
  width: 100%;
  border-collapse: collapse;
  font-size: calc(13px * var(--s));
}
.data-table th {
  background: var(--primary);
  color: #fff;
  padding: calc(8px * var(--s)) calc(10px * var(--s));
  text-align: left;
  font-weight: 600;
}
.data-table td {
  padding: calc(6px * var(--s)) calc(10px * var(--s));
  border-bottom: 1px solid var(--card-border);
}
.data-table tr:nth-child(even) td {
  background: color-mix(in srgb, var(--primary) 4%, transparent);
}
.data-table .sig { color: var(--accent); font-weight: 700; }

/* 뱃지 */
.badge {
  display: inline-block;
  padding: calc(6px * var(--s)) calc(14px * var(--s));
  border-radius: calc(16px * var(--s));
  background: color-mix(in srgb, var(--accent) 15%, transparent);
  color: var(--accent);
  font-size: var(--fs-small);
  font-weight: 600;
  margin: calc(4px * var(--s));
}

/* 타임라인 */
.timeline { list-style: none; padding-left: calc(20px * var(--s)); }
.timeline-item {
  position: relative;
  padding-left: calc(24px * var(--s));
  padding-bottom: calc(16px * var(--s));
  border-left: 2px solid var(--card-border);
}
.timeline-item:last-child { border-left-color: transparent; }
.timeline-item::before {
  content: '';
  position: absolute;
  left: calc(-7px * var(--s));
  top: calc(4px * var(--s));
  width: calc(12px * var(--s));
  height: calc(12px * var(--s));
  border-radius: 50%;
  background: var(--accent);
}
.timeline-problem::before { background: #E74C3C; }
.timeline-solution::before { background: #2ECC71; }
.timeline-label {
  font-size: var(--fs-small);
  font-weight: 700;
  text-transform: uppercase;
  opacity: 0.6;
  margin-bottom: calc(2px * var(--s));
}

/* 순서 목록 */
.step-list { list-style: none; counter-reset: step; }
.step-list li {
  counter-increment: step;
  padding: calc(6px * var(--s)) 0;
  padding-left: calc(28px * var(--s));
  position: relative;
}
.step-list li::before {
  content: counter(step);
  position: absolute;
  left: 0;
  width: calc(22px * var(--s));
  height: calc(22px * var(--s));
  border-radius: 50%;
  background: var(--accent);
  color: #fff;
  text-align: center;
  line-height: calc(22px * var(--s));
  font-size: var(--fs-small);
  font-weight: 700;
}

/* 질문 목록 */
.question-list { list-style: none; }
.question-list li {
  padding: calc(8px * var(--s)) calc(12px * var(--s));
  border-left: 3px solid var(--accent);
  margin-bottom: calc(8px * var(--s));
  background: color-mix(in srgb, var(--accent) 5%, transparent);
}

/* 레이아웃: 좌우 분할 */
.split { display: flex; gap: calc(20px * var(--s)); align-items: center; }
.split-left  { flex: 1; }
.split-right { flex: 1; }

/* cover 전용 */
.cover-inner {
  width: 100%; height: 100%;
  display: flex; flex-direction: column;
  justify-content: center; align-items: center;
  text-align: center;
  padding: calc(60px * var(--s));
}
.cover-title {
  font-size: calc(42px * var(--s));
  font-weight: 700;
  color: var(--primary);
  margin-bottom: calc(12px * var(--s));
}
.cover-subtitle {
  font-size: var(--fs-h2);
  opacity: 0.7;
  margin-bottom: calc(32px * var(--s));
}
.cover-meta {
  font-size: var(--fs-small);
  opacity: 0.5;
}
.cover-divider {
  width: calc(80px * var(--s));
  height: 3px;
  background: var(--accent);
  margin: calc(24px * var(--s)) auto;
}

/* SVG 차트 컨테이너 */
.chart-container {
  width: 100%;
  display: flex;
  justify-content: center;
  align-items: center;
}
.chart-container svg {
  max-width: 100%;
  max-height: calc(320px * var(--s));
}
.chart-container img {
  max-width: 100%;
  max-height: calc(320px * var(--s));
  object-fit: contain;
}

/* 비교 테이블 (preprocessing) */
.compare-table { width: 100%; }
.compare-table th { text-align: center; }
.compare-row-header { font-weight: 700; color: var(--primary); }

/* ============================================================
   7. 네비게이션 바
   ============================================================ */
.nav-bar {
  position: fixed;
  bottom: 0; left: 0;
  width: 100%;
  height: 48px;
  background: rgba(0,0,0,0.75);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 16px;
  z-index: 1000;
  backdrop-filter: blur(8px);
}
.nav-btn, .pdf-btn {
  border: none;
  background: rgba(255,255,255,0.15);
  color: #fff;
  padding: 6px 16px;
  border-radius: 4px;
  cursor: pointer;
  font-size: 14px;
  font-family: inherit;
}
.nav-btn:hover, .pdf-btn:hover { background: rgba(255,255,255,0.3); }
.nav-btn:disabled { opacity: 0.3; cursor: default; }
.slide-counter { color: #fff; font-size: 14px; min-width: 60px; text-align: center; }
.pdf-btn { background: rgba(91,141,239,0.4); }
.pdf-btn:hover { background: rgba(91,141,239,0.6); }

/* ============================================================
   8. @media print
   ============================================================ */
@media print {
  .nav-bar { display: none; }
  body { overflow: visible; }
  .slide { page-break-after: always; }
}
</style>
</head>
<body class="general presentation">

<div class="nav-bar">
  <button class="nav-btn" id="prev-btn">&#9664; 이전</button>
  <span class="slide-counter"><span id="current-num">1</span> / <span id="total-num">1</span></span>
  <button class="nav-btn" id="next-btn">다음 &#9654;</button>
  <button class="pdf-btn" id="pdf-btn">PDF 저장</button>
</div>

<div id="slide-viewport">
  <div id="slide-container"></div>
</div>

<script>
/* ============================================================
   SVG 차트 유틸리티
   ============================================================ */

// 테마 색상 가져오기
function getThemeColors() {
  const s = getComputedStyle(document.body);
  return {
    primary: s.getPropertyValue('--primary').trim(),
    accent:  s.getPropertyValue('--accent').trim(),
    bg:      s.getPropertyValue('--bg').trim(),
    text:    s.getPropertyValue('--text').trim()
  };
}

// 색상 보간 (0~1 사이 t값에 따라 white→color)
function colorScale(t, color) {
  const hex = color.replace('#','');
  const r = parseInt(hex.substring(0,2),16);
  const g = parseInt(hex.substring(2,4),16);
  const b = parseInt(hex.substring(4,6),16);
  const mr = Math.round(255 + (r-255)*t);
  const mg = Math.round(255 + (g-255)*t);
  const mb = Math.round(255 + (b-255)*t);
  return `rgb(${mr},${mg},${mb})`;
}

// 다크 테마용 색상 보간 (bg→color)
function colorScaleDark(t, color, bgColor) {
  const parseHex = (h) => {
    h = h.replace('#','');
    return [parseInt(h.substring(0,2),16), parseInt(h.substring(2,4),16), parseInt(h.substring(4,6),16)];
  };
  const [br,bg2,bb] = parseHex(bgColor);
  const [cr,cg,cb] = parseHex(color);
  const mr = Math.round(br + (cr-br)*t);
  const mg = Math.round(bg2 + (cg-bg2)*t);
  const mb = Math.round(bb + (cb-bb)*t);
  return `rgb(${mr},${mg},${mb})`;
}

// 막대 차트 SVG
function renderBarSVG(data) {
  const c = getThemeColors();
  const entries = Object.entries(data);
  if (!entries.length) return '';
  const W = 400, H = 250, pad = {t:20,r:20,b:50,l:50};
  const pw = W - pad.l - pad.r;
  const ph = H - pad.t - pad.b;
  const maxVal = Math.max(...entries.map(e => e[1]), 1);
  const barW = Math.min(pw / entries.length * 0.7, 50);
  const gap = pw / entries.length;

  let bars = '';
  entries.forEach(([label, val], i) => {
    const x = pad.l + i * gap + (gap - barW) / 2;
    const h = (val / maxVal) * ph;
    const y = pad.t + ph - h;
    bars += `<rect x="${x}" y="${y}" width="${barW}" height="${h}" fill="${c.accent}" rx="2"/>`;
    bars += `<text x="${x + barW/2}" y="${y - 4}" text-anchor="middle" font-size="10" fill="${c.text}">${typeof val==='number'? (val%1?val.toFixed(1):val) : val}</text>`;
    const lbl = label.length > 8 ? label.slice(0,7)+'…' : label;
    bars += `<text x="${x + barW/2}" y="${H - pad.b + 14}" text-anchor="middle" font-size="9" fill="${c.text}">${lbl}</text>`;
  });

  // y축 눈금
  let yAxis = '';
  for (let i = 0; i <= 3; i++) {
    const y = pad.t + ph - (ph * i / 3);
    const val = (maxVal * i / 3);
    yAxis += `<line x1="${pad.l}" y1="${y}" x2="${W-pad.r}" y2="${y}" stroke="${c.text}" stroke-opacity="0.1"/>`;
    yAxis += `<text x="${pad.l-6}" y="${y+3}" text-anchor="end" font-size="9" fill="${c.text}" opacity="0.6">${val%1?val.toFixed(1):Math.round(val)}</text>`;
  }

  return `<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" style="font-family:Malgun Gothic,AppleGothic,sans-serif">${yAxis}${bars}</svg>`;
}

// 선 차트 SVG
function renderLineSVG(data) {
  const c = getThemeColors();
  const xArr = data.x || [];
  const yArr = data.y || [];
  if (!xArr.length) return '';
  const W = 400, H = 250, pad = {t:20,r:20,b:50,l:50};
  const pw = W - pad.l - pad.r;
  const ph = H - pad.t - pad.b;
  const maxY = Math.max(...yArr, 1);
  const minY = Math.min(...yArr, 0);
  const range = maxY - minY || 1;

  let points = '';
  let circles = '';
  xArr.forEach((x, i) => {
    const px = pad.l + (i / Math.max(xArr.length - 1, 1)) * pw;
    const py = pad.t + ph - ((yArr[i] - minY) / range) * ph;
    points += `${px},${py} `;
    circles += `<circle cx="${px}" cy="${py}" r="3" fill="${c.accent}"/>`;
    const lbl = String(x).length > 6 ? String(x).slice(0,5)+'…' : x;
    if (xArr.length <= 12 || i % Math.ceil(xArr.length/10) === 0) {
      circles += `<text x="${px}" y="${H-pad.b+14}" text-anchor="middle" font-size="9" fill="${c.text}">${lbl}</text>`;
    }
  });

  let yAxis = '';
  for (let i = 0; i <= 3; i++) {
    const y = pad.t + ph - (ph * i / 3);
    const val = minY + range * i / 3;
    yAxis += `<line x1="${pad.l}" y1="${y}" x2="${W-pad.r}" y2="${y}" stroke="${c.text}" stroke-opacity="0.1"/>`;
    yAxis += `<text x="${pad.l-6}" y="${y+3}" text-anchor="end" font-size="9" fill="${c.text}" opacity="0.6">${val%1?val.toFixed(1):Math.round(val)}</text>`;
  }

  // 영역 채우기
  const firstX = pad.l;
  const lastX = pad.l + pw;
  const baseY = pad.t + ph;
  const areaPoints = `${firstX},${baseY} ${points.trim()} ${lastX},${baseY}`;

  return `<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" style="font-family:Malgun Gothic,AppleGothic,sans-serif">
    ${yAxis}
    <polygon points="${areaPoints}" fill="${c.accent}" opacity="0.1"/>
    <polyline points="${points.trim()}" fill="none" stroke="${c.accent}" stroke-width="2"/>
    ${circles}
  </svg>`;
}

// 히트맵 SVG
function renderHeatmapSVG(data, labels) {
  const c = getThemeColors();
  const isDark = document.body.classList.contains('ecommerce');
  if (!data || !data.length) return '';
  const rows = data.length;
  const cols = data[0].length;

  // labels 처리
  let xLabels, yLabels;
  if (Array.isArray(labels)) {
    xLabels = labels; yLabels = labels;
  } else if (labels && labels.x) {
    xLabels = labels.x; yLabels = labels.y || labels.x;
  } else {
    xLabels = Array.from({length:cols}, (_,i) => String(i));
    yLabels = Array.from({length:rows}, (_,i) => String(i));
  }

  const W = 400, H = 280;
  const labelW = 60, labelH = 40;
  const cellW = Math.min((W - labelW - 20) / cols, 40);
  const cellH = Math.min((H - labelH - 20) / rows, 30);

  // 값 범위
  let minV = Infinity, maxV = -Infinity;
  data.forEach(row => row.forEach(v => { if(v<minV) minV=v; if(v>maxV) maxV=v; }));
  const rangeV = maxV - minV || 1;

  let cells = '';
  data.forEach((row, ri) => {
    row.forEach((val, ci) => {
      const t = (val - minV) / rangeV;
      const fill = isDark ? colorScaleDark(t, c.accent, c.bg) : colorScale(t, c.primary);
      const x = labelW + ci * cellW;
      const y = labelH + ri * cellH;
      cells += `<rect x="${x}" y="${y}" width="${cellW-1}" height="${cellH-1}" fill="${fill}" rx="2"/>`;
      // 셀 안 텍스트 (7개 이하일 때만)
      if (rows <= 7 && cols <= 7) {
        const textColor = t > 0.6 ? '#fff' : c.text;
        cells += `<text x="${x+cellW/2-0.5}" y="${y+cellH/2+3}" text-anchor="middle" font-size="${cellH>25?'10':'8'}" fill="${textColor}">${typeof val==='number'?val.toFixed(2):val}</text>`;
      }
    });
  });

  // 축 레이블
  let axLabels = '';
  xLabels.forEach((l, i) => {
    const lbl = l.length > 6 ? l.slice(0,5)+'…' : l;
    axLabels += `<text x="${labelW + i*cellW + cellW/2}" y="${labelH - 6}" text-anchor="middle" font-size="9" fill="${c.text}">${lbl}</text>`;
  });
  yLabels.forEach((l, i) => {
    const lbl = l.length > 6 ? l.slice(0,5)+'…' : l;
    axLabels += `<text x="${labelW - 6}" y="${labelH + i*cellH + cellH/2 + 3}" text-anchor="end" font-size="9" fill="${c.text}">${lbl}</text>`;
  });

  return `<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" style="font-family:Malgun Gothic,AppleGothic,sans-serif">${axLabels}${cells}</svg>`;
}

// 산점도 SVG
function renderScatterSVG(data) {
  const c = getThemeColors();
  const xArr = data.x || [];
  const yArr = data.y || [];
  const lblArr = data.label || [];
  if (!xArr.length) return '';
  const W = 400, H = 250, pad = {t:20,r:20,b:40,l:50};
  const pw = W - pad.l - pad.r;
  const ph = H - pad.t - pad.b;
  const maxX = Math.max(...xArr,1), minX = Math.min(...xArr,0);
  const maxY = Math.max(...yArr,1), minY = Math.min(...yArr,0);
  const rx = maxX - minX || 1, ry = maxY - minY || 1;

  const uniqueLabels = [...new Set(lblArr)];
  const colors = [c.primary, c.accent, '#E74C3C', '#2ECC71', '#F39C12'];

  let dots = '';
  xArr.forEach((xv, i) => {
    const px = pad.l + ((xv - minX) / rx) * pw;
    const py = pad.t + ph - ((yArr[i] - minY) / ry) * ph;
    const li = uniqueLabels.indexOf(lblArr[i]);
    const fill = colors[li % colors.length] || c.accent;
    dots += `<circle cx="${px}" cy="${py}" r="4" fill="${fill}" opacity="0.7"/>`;
  });

  // 범례
  let legend = '';
  if (uniqueLabels.length > 1 && uniqueLabels.length <= 5) {
    uniqueLabels.forEach((l, i) => {
      legend += `<rect x="${pad.l + i*80}" y="${H-12}" width="8" height="8" fill="${colors[i%colors.length]}" rx="1"/>`;
      legend += `<text x="${pad.l + i*80 + 12}" y="${H-4}" font-size="9" fill="${c.text}">${l}</text>`;
    });
  }

  return `<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" style="font-family:Malgun Gothic,AppleGothic,sans-serif">${dots}${legend}</svg>`;
}

// 히스토그램 SVG
function renderHistogramSVG(data) {
  const c = getThemeColors();
  const bins = data.bins || [];
  const counts = data.counts || [];
  if (!bins.length) return '';
  const W = 400, H = 250, pad = {t:20,r:20,b:50,l:50};
  const pw = W - pad.l - pad.r;
  const ph = H - pad.t - pad.b;
  const maxC = Math.max(...counts, 1);
  const barW = pw / counts.length;

  let bars = '';
  counts.forEach((cnt, i) => {
    const x = pad.l + i * barW;
    const h = (cnt / maxC) * ph;
    const y = pad.t + ph - h;
    bars += `<rect x="${x}" y="${y}" width="${barW-1}" height="${h}" fill="${c.accent}" opacity="0.85"/>`;
    if (counts.length <= 15) {
      bars += `<text x="${x+barW/2}" y="${y-3}" text-anchor="middle" font-size="9" fill="${c.text}">${cnt}</text>`;
    }
    if (counts.length <= 12) {
      bars += `<text x="${x+barW/2}" y="${H-pad.b+14}" text-anchor="middle" font-size="8" fill="${c.text}">${bins[i]}</text>`;
    }
  });

  return `<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" style="font-family:Malgun Gothic,AppleGothic,sans-serif">${bars}</svg>`;
}

// 퍼널 차트 SVG
function renderFunnelSVG(data) {
  const c = getThemeColors();
  if (!data || !data.length) return '';
  const W = 400, H = 250, pad = {t:10,b:10,l:120,r:20};
  const ph = H - pad.t - pad.b;
  const maxW = W - pad.l - pad.r;
  const stepH = ph / data.length;
  const maxCount = data[0].count || 1;

  let shapes = '';
  data.forEach((item, i) => {
    const w = (item.count / maxCount) * maxW;
    const nextW = i < data.length-1 ? (data[i+1].count / maxCount) * maxW : w * 0.6;
    const x = pad.l + (maxW - w) / 2;
    const nx = pad.l + (maxW - nextW) / 2;
    const y = pad.t + i * stepH;
    const ny = y + stepH;

    shapes += `<polygon points="${x},${y} ${x+w},${y} ${nx+nextW},${ny} ${nx},${ny}" fill="${c.accent}" opacity="${1 - i*0.12}"/>`;
    // 라벨
    shapes += `<text x="${pad.l - 6}" y="${y + stepH/2 + 3}" text-anchor="end" font-size="10" fill="${c.text}">${item.stage}</text>`;
    const rateText = item.rate !== undefined ? ` (${(item.rate*100).toFixed(0)}%)` : '';
    shapes += `<text x="${pad.l + maxW/2}" y="${y + stepH/2 + 3}" text-anchor="middle" font-size="10" fill="#fff" font-weight="700">${fmt(item.count)}${rateText}</text>`;
  });

  return `<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" style="font-family:Malgun Gothic,AppleGothic,sans-serif">${shapes}</svg>`;
}

/* ============================================================
   헬퍼 함수
   ============================================================ */

// 숫자 포맷 (천 단위 콤마)
function fmt(n) {
  if (n == null) return '-';
  if (typeof n === 'string') return n;
  return n.toLocaleString('ko-KR');
}

// p-value 포맷
function fmtP(p) {
  if (p == null) return '-';
  if (p < 0.001) return '<0.001';
  return p.toFixed(3);
}

// insight 박스
function renderInsight(insight) {
  if (!insight) return '';
  return `<div class="insight-box">${insight}</div>`;
}

// chart.mode 분기
function renderChart(chart, rendererFn) {
  if (!chart) return '';
  if (chart.mode === 'image') {
    return `<div class="chart-container"><img src="${chart.path}" alt="chart"></div>`;
  }
  return `<div class="chart-container">${rendererFn(chart.data, chart.labels)}</div>`;
}

// 슬라이드 래퍼 (cover 제외 모든 슬라이드)
function createSlide(slide, contentHTML, index, total) {
  return `<div class="slide-inner">
    <div class="slide-header">${slide.title || ''}</div>
    <div class="slide-body">${contentHTML}</div>
    ${renderInsight(slide.insight)}
    <div class="slide-footer">${index + 1} / ${total}</div>
  </div>`;
}

/* ============================================================
   공통 슬라이드 렌더 함수 (10개)
   ============================================================ */

function renderCover(slide, meta) {
  return `<div class="cover-inner">
    <div class="cover-title">${slide.title || meta.project_name || 'Report'}</div>
    <div class="cover-divider"></div>
    <div class="cover-subtitle">${slide.subtitle || ''}</div>
    <div class="cover-meta">${meta.author || ''} &nbsp;|&nbsp; ${meta.date || ''}</div>
  </div>`;
}

function renderProblem(slide) {
  const d = slide.content || {};
  let questions = '';
  if (d.questions && d.questions.length) {
    questions = `<ul class="question-list">${d.questions.map(q => `<li>${q}</li>`).join('')}</ul>`;
  }
  return `
    <div class="card" style="margin-bottom:calc(12px * var(--s))">
      <strong style="color:var(--primary)">배경</strong>
      <p style="margin-top:calc(4px * var(--s))">${d.background || ''}</p>
    </div>
    <div class="card" style="margin-bottom:calc(12px * var(--s));border-left:3px solid var(--accent)">
      <strong style="color:var(--accent)">목적</strong>
      <p style="margin-top:calc(4px * var(--s))">${d.objective || ''}</p>
    </div>
    ${questions ? `<div style="margin-top:calc(8px * var(--s))"><strong>연구 질문</strong>${questions}</div>` : ''}
  `;
}

function renderDataOverview(slide) {
  const d = slide.content || {};
  const types = d.types || {};

    <div class="card-grid cols-3">
      <div class="metric-card">
        <div class="metric-label">행 수</div>
        <div class="metric-value">${fmt(d.rows)}</div>
      </div>
      <div class="metric-card">
        <div class="metric-label">열 수</div>
        <div class="metric-value">${fmt(d.cols)}</div>
      </div>

        <div class="metric-label">수치형 / 범주형</div>
        <div class="metric-value">${types.numeric || 0} / ${types.categorical || 0}</div>
      </div>
    </div>`;
  const chartHTML = renderChart(slide.chart, renderBarSVG);
  return `<div class="split">
    <div class="split-left">${metricsHTML}</div>
    <div class="split-right">${chartHTML}</div>
  </div>`;
}

function renderDataQuality(slide) {
  const d = slide.content || {};
  const metricsHTML = `
    <div class="card-grid cols-2" style="margin-bottom:calc(10px * var(--s))">
      <div class="metric-card">
        <div class="metric-label">결측 컬럼 수</div>
        <div class="metric-value">${fmt(d.missing_cols)}</div>
      </div>
      <div class="metric-card">
        <div class="metric-label">중복 행</div>
        <div class="metric-value">${fmt(d.duplicate_rows)}</div>
      </div>
    </div>
    ${d.treatment ? `<div class="card"><strong>처리 방법</strong><p style="margin-top:4px">${d.treatment}</p></div>` : ''}`;
  const chartHTML = renderChart(slide.chart, renderBarSVG);
  return `<div class="split">
    <div class="split-left">${metricsHTML}</div>
    <div class="split-right">${chartHTML}</div>
  </div>`;
}

function renderDistributions(slide) {
  return renderChart(slide.chart, renderHistogramSVG);
}

function renderCorrelations(slide) {
  if (!slide.chart) return '';
  return renderChart(slide.chart, (data, labels) => renderHeatmapSVG(data, labels || slide.chart.labels));
}

function renderPreprocessing(slide) {
  const d = slide.content || {};
  const b = d.before || {};
  const a = d.after || {};
  const steps = d.steps || [];
  return `
    <table class="data-table" style="margin-bottom:calc(12px * var(--s))">
      <thead><tr><th></th><th>전처리 전</th><th>전처리 후</th><th>변화</th></tr></thead>
      <tbody>
        <tr><td class="compare-row-header">행 수</td><td>${fmt(b.rows)}</td><td>${fmt(a.rows)}</td><td>${b.rows && a.rows ? fmt(a.rows - b.rows) : '-'}</td></tr>
        <tr><td class="compare-row-header">열 수</td><td>${fmt(b.cols)}</td><td>${fmt(a.cols)}</td><td>${b.cols && a.cols ? fmt(a.cols - b.cols) : '-'}</td></tr>
        <tr><td class="compare-row-header">결측값</td><td>${fmt(b.missing)}</td><td>${fmt(a.missing)}</td><td>${b.missing!=null && a.missing!=null ? fmt(a.missing - b.missing) : '-'}</td></tr>
      </tbody>
    </table>
    ${steps.length ? `<div><strong>처리 단계</strong><ol class="step-list">${steps.map(s => `<li>${s}</li>`).join('')}</ol></div>` : ''}
  `;
}

function renderStatResults(slide) {
  const rows = (slide.content && slide.content.rows) || [];
  if (!rows.length) return '<p>통계 분석 결과가 없습니다.</p>';
  return `<table class="data-table">
    <thead><tr><th>분석명</th><th>검정</th><th>통계량</th><th>p값</th><th>결론</th><th>효과 크기</th></tr></thead>
    <tbody>${rows.map(r => {
      const sig = r.p_value != null && r.p_value < 0.05;
      return `<tr>
        <td>${r.analysis||''}</td>
        <td>${r.test||''}</td>
        <td>${r.statistic!=null ? r.statistic.toFixed(3) : '-'}</td>
        <td class="${sig?'sig':''}">${fmtP(r.p_value)}</td>
        <td class="${sig?'sig':''}">${r.conclusion||''}</td>
        <td>${r.effect_size!=null ? r.effect_size.toFixed(3) : '-'}</td>
      </tr>`;
    }).join('')}</tbody>
  </table>`;
}

function renderKeyFindings(slide) {
  const findings = slide.findings || [];
  const colClass = findings.length <= 3 ? `cols-${findings.length}` : findings.length <= 4 ? 'cols-4' : 'cols-3';
  return `<div class="card-grid ${colClass}">
    ${findings.map(f => `
      <div class="metric-card ${f.highlight ? 'highlight' : ''}">
        <div class="metric-label">${f.label || ''}</div>
        <div class="metric-value">${f.value || ''}</div>
      </div>
    `).join('')}
  </div>`;
}

function renderConclusion(slide) {
  const nextSteps = slide.next_steps || [];
  return `
    <div class="card" style="margin-bottom:calc(14px * var(--s))">
      <p style="font-size:calc(15px * var(--s));line-height:1.8">${slide.summary || ''}</p>
    </div>
    ${nextSteps.length ? `
      <div style="margin-top:calc(8px * var(--s))">
        <strong style="color:var(--primary)">후속 분석 제안</strong>
        <ol class="step-list" style="margin-top:calc(8px * var(--s))">
          ${nextSteps.map(s => `<li>${s}</li>`).join('')}
        </ol>
      </div>
    ` : ''}
  `;
}

/* ============================================================
   SLIDE_RENDERERS 디스패치 맵
   ============================================================ */

const SLIDE_RENDERERS = {
  // 공통
  cover: renderCover,
  problem: renderProblem,
  data_overview: renderDataOverview,
  data_quality: renderDataQuality,
  distributions: renderDistributions,
  correlations: renderCorrelations,
  preprocessing: renderPreprocessing,
  stat_results: renderStatResults,
  key_findings: renderKeyFindings,
  conclusion: renderConclusion,
  // Finance
  risk_matrix: renderRiskMatrix,
  portfolio_performance: renderPortfolioPerformance,
  fraud_pattern: renderFraudPattern,
  // Healthcare
  clinical_significance: renderClinicalSignificance,
  survival_analysis: renderSurvivalAnalysis,
  // Manufacturing
  defect_analysis: renderDefectAnalysis,
  process_efficiency: renderProcessEfficiency,
  // Ecommerce
  funnel_analysis: renderFunnelAnalysis,
  cohort_retention: renderCohortRetention,
  // Portfolio
  tech_stack: renderTechStack,
  troubleshooting: renderTroubleshooting,
  lessons_learned: renderLessonsLearned
};

/* ============================================================
   코어: JSON 로드 + 슬라이드 생성
   ============================================================ */

let reportData = null;
let currentSlide = 0;
let totalSlides = 0;

async function main() {
  // JSON 로드
  const res = await fetch('report_data.json');
  reportData = await res.json();

  // body class 설정
  const domain = reportData.meta.domain || 'general';
  const purpose = reportData.meta.purpose || 'presentation';
  document.body.className = `${domain} ${purpose}`;

  // title 설정
  document.title = `${reportData.meta.project_name || 'Report'} — HarnessDA`;

  // slides 렌더링
  const container = document.getElementById('slide-container');
  totalSlides = reportData.slides.length;

  reportData.slides.forEach((slide, i) => {
    const renderer = SLIDE_RENDERERS[slide.type];
    if (!renderer) {
      console.warn('알 수 없는 슬라이드 타입:', slide.type);
      return;
    }

    const slideEl = document.createElement('div');
    slideEl.className = 'slide';
    slideEl.id = `slide-${i}`;
    slideEl.style.display = i === 0 ? 'flex' : 'none';

    if (slide.type === 'cover') {
      slideEl.innerHTML = renderer(slide, reportData.meta);
    } else {
      const contentHTML = renderer(slide);
      slideEl.innerHTML = createSlide(slide, contentHTML, i, totalSlides);
    }

    container.appendChild(slideEl);
  });

  // 슬라이드 카운터 초기화
  document.getElementById('total-num').textContent = totalSlides;
  document.getElementById('current-num').textContent = 1;
  updateNavButtons();
}

/* ============================================================
   네비게이션
   ============================================================ */

function goToSlide(n) {
  if (n < 0 || n >= totalSlides) return;
  document.getElementById(`slide-${currentSlide}`).style.display = 'none';
  currentSlide = n;
  document.getElementById(`slide-${currentSlide}`).style.display = 'flex';
  document.getElementById('current-num').textContent = n + 1;
  updateNavButtons();
}

function updateNavButtons() {
  document.getElementById('prev-btn').disabled = currentSlide === 0;
  document.getElementById('next-btn').disabled = currentSlide === totalSlides - 1;
}

document.getElementById('prev-btn').addEventListener('click', () => goToSlide(currentSlide - 1));
document.getElementById('next-btn').addEventListener('click', () => goToSlide(currentSlide + 1));

document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowLeft')  goToSlide(currentSlide - 1);
  if (e.key === 'ArrowRight') goToSlide(currentSlide + 1);
  if (e.key === 'Home')       goToSlide(0);
  if (e.key === 'End')        goToSlide(totalSlides - 1);
});

/* ============================================================
   PDF 저장
   ============================================================ */

async function loadScript(src) {
  return new Promise((resolve, reject) => {
    if (document.querySelector(`script[src="${src}"]`)) { resolve(); return; }
    const s = document.createElement('script');
    s.src = src; s.onload = resolve; s.onerror = reject;
    document.head.appendChild(s);
  });
}

async function savePDF() {
  const btn = document.getElementById('pdf-btn');
  const origText = btn.textContent;
  btn.textContent = '생성 중...';
  btn.disabled = true;

  const nav = document.querySelector('.nav-bar');
  nav.style.display = 'none';

  try {
    await loadScript('https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js');
    await loadScript('https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js');

    const { jsPDF } = window.jspdf;
    const slides = document.querySelectorAll('.slide');
    const slideW = slides[0].offsetWidth;
    const slideH = slides[0].offsetHeight;
    const pw = slideW * 0.264583;
    const ph = slideH * 0.264583;
    const pdf = new jsPDF({
      orientation: 'landscape',
      unit: 'mm',
      format: [pw, ph]
    });

    // 모든 슬라이드를 표시 상태로
    const origDisplays = [];
    slides.forEach((sl, i) => {
      origDisplays.push(sl.style.display);
      sl.style.display = 'flex';
    });

    for (let i = 0; i < slides.length; i++) {
      btn.textContent = `${i+1}/${slides.length}...`;

      // 한 번에 하나씩 보이게 (다른 건 숨김)
      slides.forEach((sl, j) => { sl.style.display = j === i ? 'flex' : 'none'; });

      const canvas = await html2canvas(slides[i], {
        scale: (window.devicePixelRatio || 1) * 2,
        useCORS: true,
        allowTaint: true,
        backgroundColor: null,
        width: slideW,
        height: slideH
      });

      if (i > 0) pdf.addPage([pw, ph]);
      pdf.addImage(canvas.toDataURL('image/png'), 'PNG', 0, 0, pw, ph, '', 'FAST');
    }

    // 원래 상태 복원
    slides.forEach((sl, i) => {
      sl.style.display = i === currentSlide ? 'flex' : 'none';
    });

    const fileName = (reportData.meta.project_name || 'report').replace(/[^가-힣a-zA-Z0-9_\- ]/g, '_');
    pdf.save(`${fileName}.pdf`);

  } catch (err) {
    console.error('PDF 생성 실패:', err);
    alert('PDF 생성에 실패했습니다. 인터넷 연결을 확인하세요.');
  } finally {
    nav.style.display = '';
    btn.textContent = origText;
    btn.disabled = false;
  }
}

document.getElementById('pdf-btn').addEventListener('click', savePDF);

/* ============================================================
   초기화
   ============================================================ */

document.fonts.ready.then(() => {
  main().catch(err => {
    console.error('보고서 로드 실패:', err);
    const container = document.getElementById('slide-container');
    container.innerHTML = `<div class="slide" style="display:flex;justify-content:center;align-items:center">
      <div style="text-align:center;opacity:0.6">
        <p style="font-size:18px;margin-bottom:8px">report_data.json을 로드할 수 없습니다.</p>
        <p style="font-size:13px">${err.message}</p>
      </div>
    </div>`;
  });
});
